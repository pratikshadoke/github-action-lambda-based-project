name: Build React UI

on:
  push:
    branches:
      - main

jobs:
  build-ui:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: task-ui

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build